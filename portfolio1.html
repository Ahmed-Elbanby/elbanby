<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve Jobs | Product Designer Portfolio</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP and ScrollTrigger CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Smooth scrolling and minor customizations */
        html {
            scroll-behavior: smooth;
        }
        .skill-bar {
            background-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Data (same as original)
        const data = {
            personalInfo: {
                name: "Steve Jobs",
                title: "Senior Product Designer",
                image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=1974&auto=format&fit=crop",
                summary: "Crafting beautiful, user-centered digital experiences. Specializing in product design, design systems, and user research.",
                stats: {
                    yearsExperience: "8+",
                    projectsCompleted: "50+",
                    designAwards: "12",
                    happyClients: "30+",
                },
            },
            skills: [
                {
                    title: "UI Design",
                    description: "Creating intuitive and beautiful interfaces",
                    iconPath: "M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5", // PenTool (simplified)
                    level: 95,
                },
                {
                    title: "UX Research",
                    description: "Understanding user needs and behaviors",
                    iconPath: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 3a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75", // Users
                    level: 90,
                },
                {
                    title: "Design Systems",
                    description: "Building scalable and consistent design systems",
                    iconPath: "M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5", // Layers (same as PenTool for simplicity, but works)
                    level: 92,
                },
                {
                    title: "Prototyping",
                    description: "Creating interactive prototypes and animations",
                    iconPath: "M5 12h14M12 5l7 7-7 7", // Figma-like arrow? Actually using Figma icon path
                    level: 88,
                },
            ],
            caseStudies: [
                {
                    title: "Redesigning the E-commerce Experience",
                    client: "Fashion Retailer",
                    image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=2070&auto=format&fit=crop",
                    description: "A complete overhaul of the shopping experience, resulting in a 40% increase in conversion rate.",
                    process: ["User Research", "Wireframing", "Prototyping", "User Testing", "Implementation"],
                    results: { conversionRate: "+40%", userSatisfaction: "+35%", timeToPurchase: "-25%" },
                },
                {
                    title: "Mobile Banking App Redesign",
                    client: "FinTech Startup",
                    image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=2070&auto=format&fit=crop",
                    description: "Modernizing the banking experience for millennials with a focus on simplicity and security.",
                    process: ["Competitive Analysis", "User Interviews", "Journey Mapping", "UI Design", "Usability Testing"],
                    results: { appRating: "4.8/5", userRetention: "+45%", featureAdoption: "+60%" },
                },
            ],
            designSystem: {
                title: "Design System Showcase",
                description: "A comprehensive design system built for scalability and consistency",
                components: [
                    { name: "Typography", image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=2070&auto=format&fit=crop" },
                    { name: "Color Palette", image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=2070&auto=format&fit=crop" },
                    { name: "Components", image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=2070&auto=format&fit=crop" },
                    { name: "Icons", image: "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?q=80&w=2070&auto=format&fit=crop" },
                ],
            },
            socialLinks: [
                { iconPath: "M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48c-1.94-.42-3.94-.42-5.88 0C7.27.65 6.09 1 6.09 1A5.07 5.07 0 0 0 6 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 10 18.13V22", url: "https://dribbble.com/", label: "Dribbble", followers: "15K" }, // Dribbble
                { iconPath: "M7 7h10M7 12h10M7 17h5M10 3L4 7v10l6 4 6-4V7l-6-4z", url: "https://behance.net/", label: "Behance", followers: "12K" }, // Behance (simplified)
                { iconPath: "M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z", url: "https://instagram.com/", label: "Instagram", followers: "25K" }, // Instagram
                { iconPath: "M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 4 13a11.64 11.64 0 0 1-7 2c3 2 7 2 10 1", url: "https://twitter.com/", label: "Twitter", followers: "18K" }, // Twitter
                { iconPath: "M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 2a2 2 0 1 1 0 4 2 2 0 0 1 0-4z", url: "https://linkedin.com/", label: "LinkedIn", followers: "8K" }, // LinkedIn
            ],
        };

        // Icons – using inline SVG components
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d={path} />
            </svg>
        );

        // Main component
        const PortfolioTemplate19 = () => {
            const [isScrolled, setIsScrolled] = React.useState(false);
            const containerRef = React.useRef(null);

            React.useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            React.useEffect(() => {
                // Register ScrollTrigger with GSAP
                gsap.registerPlugin(ScrollTrigger);

                // Animate sections on scroll
                gsap.utils.toArray("section").forEach((section, i) => {
                    gsap.from(section, {
                        scrollTrigger: {
                            trigger: section,
                            start: "top bottom-=100",
                            toggleActions: "play none none reverse",
                        },
                        y: 100,
                        opacity: 0,
                        duration: 1,
                        delay: i * 0.2,
                    });
                });

                // Animate skill bars
                gsap.utils.toArray(".skill-bar").forEach((bar) => {
                    gsap.from(bar, {
                        scrollTrigger: {
                            trigger: bar,
                            start: "top bottom-=50",
                        },
                        width: 0,
                        duration: 1.5,
                        ease: "power2.out",
                    });
                });

                // Cleanup
                return () => {
                    ScrollTrigger.getAll().forEach(trigger => trigger.kill());
                };
            }, []);

            return (
                <div ref={containerRef} className="min-h-screen bg-white text-gray-900">
                    {/* Hero Section */}
                    <section className="relative min-h-screen flex items-center justify-center">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                                <div>
                                    <h1 className="text-6xl md:text-7xl font-bold mb-6">{data.personalInfo.name}</h1>
                                    <p className="text-2xl text-gray-600 mb-8">{data.personalInfo.title}</p>
                                    <p className="text-gray-600 mb-12 text-lg">{data.personalInfo.summary}</p>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-8 mb-12">
                                        {Object.entries(data.personalInfo.stats).map(([key, value]) => (
                                            <div key={key} className="text-center">
                                                <p className="text-3xl font-bold mb-2">{value}</p>
                                                <p className="text-gray-600 capitalize">{key.replace(/([A-Z])/g, " $1").trim()}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex space-x-4">
                                        {data.socialLinks.map((link, idx) => (
                                            <a key={idx} href={link.url} target="_blank" rel="noopener noreferrer" className="p-3 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">
                                                <Icon path={link.iconPath} className="w-6 h-6" />
                                            </a>
                                        ))}
                                    </div>
                                </div>
                                <div className="relative">
                                    <img src={data.personalInfo.image} alt={data.personalInfo.name} className="w-full h-[600px] object-cover rounded-2xl" />
                                    <div className="absolute inset-0 rounded-2xl bg-gradient-to-t from-black/10 to-transparent"></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section className="py-20 bg-gray-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12">Skills & Expertise</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {data.skills.map((skill, idx) => (
                                    <div key={idx} className="bg-white p-8 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                                        <div className="flex items-center space-x-4 mb-4">
                                            <Icon path={skill.iconPath} className="w-8 h-8 text-blue-600" />
                                            <h3 className="text-xl font-semibold">{skill.title}</h3>
                                        </div>
                                        <p className="text-gray-600 mb-4">{skill.description}</p>
                                        <div className="w-full bg-gray-200 rounded-full h-2">
                                            <div className="skill-bar bg-blue-600 h-2 rounded-full" style={{ width: `${skill.level}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Case Studies Section */}
                    <section className="py-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12">Case Studies</h2>
                            <div className="space-y-20">
                                {data.caseStudies.map((study, idx) => (
                                    <div key={idx} className="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                                        <div className={`order-2 ${idx % 2 === 0 ? "md:order-1" : "md:order-2"}`}>
                                            <h3 className="text-3xl font-bold mb-4">{study.title}</h3>
                                            <p className="text-gray-600 mb-6">{study.description}</p>
                                            <div className="mb-8">
                                                <h4 className="text-lg font-semibold mb-4">Process</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {study.process.map((step, i) => (
                                                        <span key={i} className="px-4 py-2 bg-gray-100 rounded-full text-sm">{step}</span>
                                                    ))}
                                                </div>
                                            </div>
                                            <div>
                                                <h4 className="text-lg font-semibold mb-4">Results</h4>
                                                <div className="grid grid-cols-3 gap-4">
                                                    {Object.entries(study.results).map(([key, value]) => (
                                                        <div key={key} className="text-center">
                                                            <p className="text-2xl font-bold text-blue-600">{value}</p>
                                                            <p className="text-sm text-gray-600 capitalize">{key.replace(/([A-Z])/g, " $1").trim()}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        <div className={`relative order-1 ${idx % 2 === 0 ? "md:order-2" : "md:order-1"}`}>
                                            <img src={study.image} alt={study.title} className="w-full aspect-[4/3] object-cover rounded-2xl" />
                                            <div className="absolute inset-0 rounded-2xl bg-gradient-to-t from-black/20 to-transparent"></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Design System Section */}
                    <section className="py-20 bg-gray-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-4xl font-bold text-center mb-12">{data.designSystem.title}</h2>
                            <p className="text-gray-600 text-center mb-12 max-w-2xl mx-auto">{data.designSystem.description}</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {data.designSystem.components.map((comp, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                        <img src={comp.image} alt={comp.name} className="w-full aspect-square object-cover" />
                                        <div className="p-6">
                                            <h3 className="text-xl font-semibold mb-2">{comp.name}</h3>
                                            <a href="#" className="inline-flex items-center text-blue-600 hover:text-blue-700">
                                                <span>View Details</span>
                                                <Icon path="M5 12h14M12 5l7 7-7 7" className="w-4 h-4 ml-2" /> {/* ArrowRight */}
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("root")).render(<PortfolioTemplate19 />);
    </script>
</body>
</html>
