<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Doe | Design Engineer Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP core and plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Custom styles for smoother scrolling and cursor */
        html {
            scroll-behavior: smooth;
        }
        .skill-bar {
            background-color: #3b82f6;
        }
        /* Ensure the custom cursor doesn't block clicks */
        .custom-cursor {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Data with icon names (instead of components)
        const data = {
            personalInfo: {
                name: "John Doe",
                title: "Design Engineer",
                avatar: "https://avatars.githubusercontent.com/shreyvijayvargiya",
                image: "https://firebasestorage.googleapis.com/v0/b/ihatereading-4ba52.appspot.com/o/public%2Fusers%2Fdownload.jpeg?alt=media&token=45387c9c-560c-4b54-919c-0037cdb4432b",
                summary: "Creative Design Engineer with expertise in UI/UX design, product design, and design systems.",
                socialLinks: [
                    { icon: "github", label: "GitHub", url: "https://github.com/johndoe" },
                    { icon: "linkedin", label: "LinkedIn", url: "https://www.linkedin.com/in/johndoe" },
                    { icon: "globe", label: "Portfolio", url: "https://johndoe.dev" },
                ],
            },
            about: {
                text: "Design Engineer passionate about creating intuitive and delightful user experiences. Specializing in design systems, interactive prototypes, and bridging the gap between design and development. Currently crafting beautiful interfaces at",
                website: { text: "TechCorp", url: "https://techcorp.com" },
            },
            experience: [
                {
                    title: "Senior Design Engineer",
                    company: "DesignCraft",
                    url: "https://designcraft.com",
                    period: "2022 - Present",
                    responsibilities: [
                        "Led the development of a comprehensive design system used by 50+ designers",
                        "Reduced design-to-development handoff time by 60% through automated workflows",
                        "Created interactive prototypes resulting in 40% faster user testing cycles",
                        "Implemented micro-interactions increasing user engagement by 35%",
                    ],
                    tech: ["Figma", "React", "Framer", "Storybook", "Webflow", "GSAP"],
                },
                {
                    title: "UI/UX Engineer",
                    company: "CreativeFlow",
                    url: "https://creativeflow.com",
                    period: "2020 - 2022",
                    responsibilities: [
                        "Designed and developed responsive web applications with 99% accessibility scores",
                        "Created animation systems improving user engagement metrics by 45%",
                        "Built interactive design documentation viewed by 10K+ developers monthly",
                    ],
                    tech: ["Sketch", "React", "Three.js", "CSS/SASS", "Motion Design"],
                },
            ],
            skills: {
                design: [
                    { name: "UI Design", icon: "layout" },
                    { name: "Design Systems", icon: "grid" },
                    { name: "Typography", icon: "type" },
                    { name: "Color Theory", icon: "palette" },
                ],
                tools: [
                    { name: "Figma", icon: "figma" },
                    { name: "Sketch", icon: "pen-tool" },
                    { name: "Adobe XD", icon: "layers" },
                    { name: "Framer", icon: "zap" },
                ],
                prototyping: [
                    { name: "Interactions", icon: "target" },
                    { name: "Animations", icon: "sparkles" },
                    { name: "Micro-interactions", icon: "lightbulb" },
                    { name: "Responsive", icon: "monitor" },
                ],
                development: [
                    { name: "HTML/CSS", icon: "layout" },
                    { name: "JavaScript", icon: "shapes" },
                    { name: "React", icon: "grid" },
                    { name: "GSAP", icon: "zap" },
                ],
                visual: [
                    { name: "Illustration", icon: "pencil" },
                    { name: "Iconography", icon: "image" },
                    { name: "Branding", icon: "brush" },
                    { name: "Motion", icon: "sparkles" },
                ],
            },
            projects: [
                {
                    title: "Enterprise Design System",
                    description: "Created a comprehensive design system powering applications used by millions",
                    tech: ["Figma", "React", "Storybook"],
                    metrics: ["200+ Components", "50+ Design Tokens", "98% Consistency Score"],
                },
                {
                    title: "Interactive Product Showcase",
                    description: "Developed an immersive 3D product visualization platform",
                    tech: ["Three.js", "GSAP", "WebGL"],
                    metrics: ["45% Engagement Increase", "3s Load Time", "60fps Animations"],
                },
            ],
            contact: {
                email: { address: "john.doe@example.com", url: "mailto:john.doe@example.com" },
                phone: { number: "+1 (555) 123-4567", url: "tel:+15551234567" },
            },
        };

        // Helper component for Lucide icons
        const Icon = ({ name, className = "w-5 h-5" }) => {
            return <i data-lucide={name} className={className}></i>;
        };

        const PortfolioTemplate4 = () => {
            const [activeSection, setActiveSection] = React.useState("about");
            const [isScrolled, setIsScrolled] = React.useState(false);
            const navRef = React.useRef(null);
            const heroRef = React.useRef(null);
            const sectionsRef = React.useRef([]);
            const cursorRef = React.useRef(null);

            // Scroll listener for navbar transparency
            React.useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            // Custom cursor effect
            React.useEffect(() => {
                const handleMouseMove = (e) => {
                    if (cursorRef.current) {
                        cursorRef.current.style.left = e.clientX + "px";
                        cursorRef.current.style.top = e.clientY + "px";
                    }
                };
                window.addEventListener("mousemove", handleMouseMove);
                return () => window.removeEventListener("mousemove", handleMouseMove);
            }, []);

            // GSAP animations
            React.useEffect(() => {
                // Register ScrollTrigger
                gsap.registerPlugin(ScrollTrigger);

                // Hero timeline
                const tl = gsap.timeline();
                tl.from(heroRef.current?.querySelector("h1"), {
                    y: 100,
                    opacity: 0,
                    duration: 1,
                    ease: "power4.out",
                })
                    .from(
                        heroRef.current?.querySelector("p"),
                        {
                            y: 50,
                            opacity: 0,
                            duration: 1,
                            ease: "power4.out",
                        },
                        "-=0.5"
                    )
                    .from(
                        heroRef.current?.querySelectorAll("a"),
                        {
                            y: 30,
                            opacity: 0,
                            duration: 0.8,
                            stagger: 0.1,
                            ease: "power4.out",
                        },
                        "-=0.5"
                    );

                // Animate each section on scroll
                sectionsRef.current.forEach((section, index) => {
                    gsap.from(section, {
                        scrollTrigger: {
                            trigger: section,
                            start: "top 80%",
                            toggleActions: "play none none reverse",
                        },
                        opacity: 0,
                        y: 50,
                        rotation: 5,
                        duration: 1,
                        ease: "power3.out",
                        delay: index * 0.2,
                    });
                });

                // Cleanup
                return () => {
                    ScrollTrigger.getAll().forEach(trigger => trigger.kill());
                };
            }, []);

            // Lucide icon replacement after each render
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const sections = [
                { id: "about", label: "About" },
                { id: "experience", label: "Experience" },
                { id: "skills", label: "Skills" },
                { id: "projects", label: "Projects" },
                { id: "contact", label: "Contact" },
            ];

            const handleSectionClick = (sectionId) => {
                setActiveSection(sectionId);
                const element = document.getElementById(sectionId);
                if (element) {
                    // Use global GSAP with ScrollToPlugin
                    gsap.to(window, {
                        duration: 1,
                        scrollTo: { y: element, offsetY: 80 },
                        ease: "power3.inOut",
                    });
                }
            };

            return (
                <div className="min-h-screen bg-[#FAFAFA] text-gray-900">
                    {/* Custom cursor */}
                    <div
                        ref={cursorRef}
                        className="fixed w-8 h-8 pointer-events-none z-50 mix-blend-difference custom-cursor"
                        style={{
                            background: "rgba(255, 255, 255, 0.2)",
                            borderRadius: "50%",
                            transform: "translate(-50%, -50%)",
                            transition: "transform 0.1s ease-out",
                        }}
                    />

                    {/* Creative background */}
                    <div className="fixed inset-0 z-0 opacity-10">
                        <div className="absolute inset-0 bg-gradient-to-r from-purple-200 via-pink-200 to-red-200" />
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-transparent via-white to-transparent" />
                    </div>

                    {/* Navigation */}
                    <nav
                        ref={navRef}
                        className={`fixed top-0 w-full z-50 transition-all duration-300 ${
                            isScrolled
                                ? "bg-white/80 backdrop-blur-md shadow-lg"
                                : "bg-transparent"
                        }`}
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex items-center justify-between h-16">
                                <div className="flex items-center space-x-2 text-gray-900">
                                    <Icon name="palette" className="w-6 h-6" />
                                    <span className="font-display text-xl">Design</span>
                                </div>
                                <div className="flex space-x-8">
                                    {sections.map((section) => (
                                        <button
                                            key={section.id}
                                            onClick={() => handleSectionClick(section.id)}
                                            className={`text-sm font-medium transition-colors ${
                                                activeSection === section.id
                                                    ? "text-purple-600"
                                                    : "text-gray-600 hover:text-purple-600"
                                            }`}
                                        >
                                            {section.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section
                        ref={heroRef}
                        className="relative min-h-screen flex items-center justify-center pt-16"
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center">
                                <h1 className="text-5xl md:text-7xl font-display font-bold mb-6 bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 bg-clip-text text-transparent">
                                    {data.personalInfo.name}
                                </h1>
                                <p className="text-xl md:text-2xl text-gray-600 mb-8">
                                    {data.personalInfo.title}
                                </p>
                                <p className="text-lg text-gray-600 mb-8 max-w-2xl mx-auto">
                                    {data.personalInfo.summary}
                                </p>
                                <div className="flex justify-center space-x-6">
                                    {data.personalInfo.socialLinks.map((link, idx) => (
                                        <a
                                            key={idx}
                                            href={link.url}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="text-gray-600 hover:text-purple-600 transition-colors"
                                        >
                                            <Icon name={link.icon} className="w-6 h-6" />
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* About Section (not in original data, but we add it for completeness) */}
                    <section
                        id="about"
                        ref={(el) => (sectionsRef.current[0] = el)}
                        className="py-20"
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-white rounded-2xl p-8 shadow-xl">
                                <h2 className="text-3xl font-display font-bold mb-6 text-gray-900">About</h2>
                                <p className="text-gray-600 text-lg mb-4">
                                    {data.about.text}{" "}
                                    <a href={data.about.website.url} target="_blank" rel="noopener noreferrer" className="text-purple-600 hover:underline">
                                        {data.about.website.text}
                                    </a>
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section
                        id="skills"
                        ref={(el) => (sectionsRef.current[1] = el)}
                        className="py-20"
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-3xl font-display font-bold mb-12 text-gray-900">Design Expertise</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {Object.entries(data.skills).map(([category, skills]) => (
                                    <div key={category} className="bg-white rounded-2xl p-8 shadow-xl hover:shadow-2xl transition-shadow duration-300">
                                        <h3 className="text-xl font-display font-bold mb-6 text-gray-900 capitalize">{category}</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            {skills.map((skill, idx) => (
                                                <div key={idx} className="flex items-center space-x-3 text-gray-600">
                                                    <Icon name={skill.icon} className="w-5 h-5 text-purple-600" />
                                                    <span>{skill.name}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Projects Section */}
                    <section
                        id="projects"
                        ref={(el) => (sectionsRef.current[2] = el)}
                        className="py-20 bg-gradient-to-b from-white to-purple-50"
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-3xl font-display font-bold mb-12 text-gray-900">Featured Work</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {data.projects.map((project, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl p-8 shadow-xl hover:shadow-2xl transition-shadow duration-300">
                                        <h3 className="text-xl font-display font-bold mb-4 text-gray-900">{project.title}</h3>
                                        <p className="text-gray-600 mb-6">{project.description}</p>
                                        <div className="mb-6">
                                            <h4 className="text-sm font-medium text-gray-900 mb-2">Technologies:</h4>
                                            <div className="flex flex-wrap gap-2">
                                                {project.tech.map((tech, i) => (
                                                    <span key={i} className="px-3 py-1 text-sm bg-purple-100 text-purple-600 rounded-full">{tech}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <h4 className="text-sm font-medium text-gray-900 mb-2">Impact:</h4>
                                            <ul className="list-disc list-inside text-gray-600">
                                                {project.metrics.map((metric, i) => (
                                                    <li key={i}>{metric}</li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Experience Section */}
                    <section
                        id="experience"
                        ref={(el) => (sectionsRef.current[3] = el)}
                        className="py-20"
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <h2 className="text-3xl font-display font-bold mb-12 text-gray-900">Work Experience</h2>
                            <div className="space-y-12">
                                {data.experience.map((job, idx) => (
                                    <div key={idx} className="bg-white rounded-2xl p-8 shadow-xl hover:shadow-2xl transition-shadow duration-300">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h3 className="text-xl font-display font-bold text-gray-900 mb-2">{job.title}</h3>
                                                <a href={job.url} target="_blank" rel="noopener noreferrer" className="text-purple-600 hover:text-purple-700 transition-colors">{job.company}</a>
                                            </div>
                                            <span className="text-gray-500">{job.period}</span>
                                        </div>
                                        <ul className="list-disc list-inside text-gray-600 space-y-2 mb-6">
                                            {job.responsibilities.map((resp, i) => (
                                                <li key={i}>{resp}</li>
                                            ))}
                                        </ul>
                                        <div className="flex flex-wrap gap-2">
                                            {job.tech?.map((tech, i) => (
                                                <span key={i} className="px-3 py-1 text-sm bg-purple-100 text-purple-600 rounded-full">{tech}</span>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section
                        id="contact"
                        ref={(el) => (sectionsRef.current[4] = el)}
                        className="py-20 bg-gradient-to-t from-white to-purple-50"
                    >
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="bg-white rounded-2xl p-8 shadow-xl">
                                <h2 className="text-3xl font-display font-bold mb-8 text-gray-900">Let's Create Together</h2>
                                <div className="space-y-6">
                                    <a href={data.contact.email.url} className="flex items-center space-x-4 text-gray-600 hover:text-purple-600 transition-colors">
                                        <Icon name="mail" className="w-6 h-6" />
                                        <span>{data.contact.email.address}</span>
                                    </a>
                                    <a href={data.contact.phone.url} className="flex items-center space-x-4 text-gray-600 hover:text-purple-600 transition-colors">
                                        <Icon name="phone" className="w-6 h-6" />
                                        <span>{data.contact.phone.number}</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        // Render the app
        ReactDOM.createRoot(document.getElementById("root")).render(<PortfolioTemplate4 />);
    </script>
</body>
</html>
